<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitGaze — profile lookup, in your terminal</title>
  <meta name="description" content="Look up any GitHub profile from a terminal-styled interface." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="scanlines" aria-hidden="true"></div>

  <main class="wrap">
    <header class="head">
      <div class="logo">
        <span class="logo-caret">&gt;_</span>
        <span class="logo-text">gitgaze</span>
      </div>
      <p class="eyebrow">// github profile lookup, in your terminal</p>
    </header>

    <section class="terminal" role="search">
      <div class="terminal-bar">
        <span class="dot dot-r"></span>
        <span class="dot dot-y"></span>
        <span class="dot dot-g"></span>
        <span class="terminal-title">guest@gitgaze — zsh</span>
      </div>

      <div class="terminal-body">
        <div class="prompt-row">
          <label for="searchInput" class="prompt">
            <span class="prompt-user">guest</span><span class="prompt-at">@</span><span
              class="prompt-host">gitgaze</span><span class="prompt-sep">:~$</span>
          </label>
          <span class="prompt-cmd">fetch</span>
          <input type="text" id="searchInput" class="prompt-input" placeholder="username" autocomplete="off"
            autocapitalize="off" spellcheck="false" />
          <button id="searchBtn" class="prompt-run" aria-label="Run search">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
              <path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </button>
        </div>

        <div id="output" class="output" aria-live="polite"></div>
      </div>
    </section>

    <p class="hint">Press <kbd>Enter</kbd> to run &middot; data via the public GitHub API</p>
  </main>

  <script src="script.js"></script>
</body>

</html>
