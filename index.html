<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitGaze</title>
  <!-- fontawesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <!-- Tailwind CSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
</head>

<body class="flex justify-center items-center min-h-screen bg-gradient-to-br from-black via-gray-900 to-gray-800">
  <div class="w-[420px] text-white">
    <h1 class="text-3xl font-bold text-center mb-5">GitGaze</h1>
    <!-- Search Bar -->
    <div class="flex gap-2 mb-5">
      <input type="text" id="username" placeholder="Enter GitHub username"
        class="flex-1 p-2 rounded-lg bg-black/40 border border-gray-500 outline-none focus:border-blue-400"
        id="searchInput" />
      <button class="bg-blue-500 px-4 rounded-lg hover:bg-blue-600 transition cursor-pointer" id="searchBtn">
        <i class="fa-solid fa-search"></i>
      </button>
    </div>
    <!-- Skeleton Loader -->
    <div id="Skeleton"
      class="hidden animate-pulse bg-white/10 backdrop-blur-md border border-white/20 rounded-xl p-5 space-y-6">
      <div class="w-24 h-24 bg-gray-500 rounded-full mx-auto"></div>
      <div class="space-y-2">
        <div class="h-4 bg-gray-500 rounded w-3/4 mx-auto"></div>
        <div class="h-3 bg-gray-500 rounded w-3/4 mx-auto"></div>
      </div>
      <div class="flex justify-between">
        <div class="space-y-2 text-center">
          <div class="h-4 w-16 bg-gray-500 rounded-full mx-auto"></div>
          <div class="h-4 w-12 bg-gray-500 rounded-full mx-auto"></div>
        </div>
        <div class="space-y-2 text-center">
          <div class="h-4 w-16 bg-gray-500 rounded-full mx-auto"></div>
          <div class="h-4 w-12 bg-gray-500 rounded-full mx-auto"></div>
        </div>
        <div class="space-y-2 text-center">
          <div class="h-4 w-16 bg-gray-500 rounded-full mx-auto"></div>
          <div class="h-4 w-12 bg-gray-500 rounded-full mx-auto"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
